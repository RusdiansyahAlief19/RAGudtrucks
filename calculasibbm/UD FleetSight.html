<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UD FleetSight</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary: #0A2463;
    --primary-700: #0d2d7a;
    --primary-light: #1E5BB8;
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --success: #1FA971;
    --success-bg: #E7F6EF;
    --warning: #F5A623;
    --warning-bg: #FDF3E0;
    --danger: #E63946;
    --danger-bg: #FCEBEC;
    --text: #1A1D29;
    --text-2: #6B7280;
    --text-3: #9aa1ad;
    --border: #E8EAEF;
    --border-2: #EFF1F4;
    --shadow-sm: 0 1px 2px rgba(16,24,40,.05);
    --shadow: 0 1px 3px rgba(16,24,40,.07), 0 1px 2px rgba(16,24,40,.04);
    --shadow-md: 0 4px 16px rgba(16,24,40,.08), 0 2px 4px rgba(16,24,40,.04);
    --shadow-lg: 0 12px 32px rgba(10,36,99,.12);
    --radius: 14px;
    --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--sans);
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #app { height: 100vh; overflow: hidden; }
  button { font-family: inherit; cursor: pointer; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d4d8e0; border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #c0c6d2; }
  ::-webkit-scrollbar-track { background: transparent; }
  .mono { font-family: var(--mono); }
  .plate {
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: .02em;
  }
  @keyframes fadeUp { from { transform: translateY(10px); } to { transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  @keyframes drawLine { from { stroke-dashoffset: var(--len); } to { stroke-dashoffset: 0; } }
  @keyframes growBar { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .screen-enter { animation: fadeUp .35s cubic-bezier(.16,1,.3,1); }
  .noshrink > * { flex: 0 0 auto; }
  @media (prefers-reduced-motion: reduce) { .screen-enter { animation: none; } }
</style>
</head>
<body>
<div id="app"></div>

<template id="__bundler_thumbnail" data-bg-color="#0A2463">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0A2463"/>
    <g transform="translate(600 360)" fill="none" stroke="#5fa0ff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-150 -70 H30 a20 20 0 0 1 20 20 V70 H-150 a20 20 0 0 1 -20 -20 V-50 a20 20 0 0 1 20 -20 Z"/>
      <path d="M50 -30 H110 a20 20 0 0 1 16 8 L160 30 a20 20 0 0 1 4 12 V50 a20 20 0 0 1 -20 20 H50 Z"/>
      <circle cx="-90" cy="92" r="34" fill="#0A2463"/>
      <circle cx="110" cy="92" r="34" fill="#0A2463"/>
    </g>
    <text x="600" y="560" text-anchor="middle" fill="#ffffff" font-family="'Plus Jakarta Sans',sans-serif" font-weight="800" font-size="58" letter-spacing="-1">UD FleetSight</text>
    <text x="600" y="610" text-anchor="middle" fill="#5fa0ff" font-family="'Plus Jakarta Sans',sans-serif" font-weight="600" font-size="26" letter-spacing="6">FLEET ANALYTICS</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app/data.js"></script>
<script type="text/babel" src="app/icons.js"></script>
<script type="text/babel" src="app/charts.js"></script>
<script type="text/babel" src="app/ui.js"></script>
<script type="text/babel" src="app/screens/Dashboard.js"></script>
<script type="text/babel" src="app/screens/Predictive.js"></script>
<script type="text/babel" src="app/screens/Drivers.js"></script>
<script type="text/babel" src="app/screens/FuelMap.js"></script>
<script type="text/babel" src="app/screens/Mechanic.js"></script>
<script type="text/babel" src="app/main.js"></script>
</body>
</html>
